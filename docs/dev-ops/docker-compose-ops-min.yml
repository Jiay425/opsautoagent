services:
  mysql:
    image: mysql:8.0.32
    container_name: ops-mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "13306:3306"
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/mysql.cnf:ro
      - ./mysql/sql:/docker-entrypoint-initdb.d:ro
      - ops_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    networks:
      - ops-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ops_prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - ops-network

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ops-grafana
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      GF_SERVER_HTTP_PORT: 4000
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DATABASE_TYPE: mysql
      GF_DATABASE_HOST: mysql:3306
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: root
      GF_DATABASE_PASSWORD: 123456
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      mysql:
        condition: service_healthy
      prometheus:
        condition: service_started
    networks:
      - ops-network

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: ops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - ops-network

volumes:
  ops_mysql_data:
  ops_prometheus_data:

networks:
  ops-network:
    driver: bridge
